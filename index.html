<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Nether Animado</title>
<style>
body{background:#0f0a1a;display:grid;place-items:center;height:100vh;margin:0}
.portal{
  width:200px;height:300px;
  background:radial-gradient(circle at center,#4A148C 0%,#7B1FA2 50%,#120522 100%);
  border:6px solid #BA68C8;
  border-radius:20px;
  position:relative;
  overflow:hidden;
  box-shadow:
    0 0 60px #AB47BC,
    inset 0 0 80px rgba(186,104,200,.4);
  animation:pulse 3s ease-in-out infinite;
}
.portal::before{
  content:'';position:absolute;inset:15%;
  background:conic-gradient(from 0deg,#E1BEE7,#BA68C8,#9C27B0,#7B1FA2,transparent 70%);
  border-radius:15px;
  animation:spin 8s linear infinite,swirl 4s ease-in-out infinite alternate;
  filter:blur(8px);
}
.portal::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(transparent 40%,rgba(124,21,162,.3) 50%,transparent 60%);
  animation:wave 2.5s linear infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1);box-shadow:0 0 60px #AB47BC,inset 0 0 80px rgba(186,104,200,.4)}
  50%{transform:scale(1.05);box-shadow:0 0 100px #E040FB,inset 0 0 120px rgba(224,64,251,.6)}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes swirl{
  0%{clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
  100%{clip-path:polygon(30% 20%,80% 30%,70% 80%,20% 70%)}
}
@keyframes wave{
  0%{transform:translateY(-100%)}
  100%{transform:translateY(100%)}
}
h2{color:#BA68C8;font-family:system-ui;text-align:center;margin:20px}
</style>
</head>
<body>
  <div class="portal"></div>
  <h2>Portal al Nether Activado 🟪✨</h2>
</body>
</html>
